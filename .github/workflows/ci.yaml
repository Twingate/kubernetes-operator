name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'main'

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.14.5
  POETRY_VERSION: 2.4.1

jobs:
  dockerfile-lint:
    runs-on: ubuntu-latest
    name: Dockerfile lint
    steps:
      - run: echo "github ref is ${{ github.head_ref }} ${{ github.base_ref }}"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  helm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.19.2'
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3
      - name: Build helm dependencies
        run: helm dependency build ./deploy/twingate-operator
      - name: Run tests
        run: helm unittest deploy/twingate-operator

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      id: setup_python
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install and configure Poetry
      uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
      with:
        version: ${{ env.POETRY_VERSION }}
        virtualenvs-create: true
        virtualenvs-in-project: true
        installer-parallel: true

    - name: Cache Dependencies
      id: cache-dev-deps
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .venv
        key: poetry-dev-deps-${{ github.job }}-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-poetry${{ env.POETRY_VERSION }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          poetry-dev-deps-${{ github.job }}-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-poetry${{ env.POETRY_VERSION }}-

    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/pre-commit/
        key: pre-commit-${{ github.job }}-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-poetry${{ env.POETRY_VERSION }}-${{ hashFiles('**/poetry.lock') }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          pre-commit-${{ github.job }}-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-poetry${{ env.POETRY_VERSION }}-

    - run: make dev-deps
    - run: make check-pre-commit skip=shellcheck,markdownlint,no-commit-to-branch

    - name: Check the validity of pyproject.toml
      run: poetry check

    - name: Lint (ruff)
      run: make lint

    - name: Typecheck
      run: make typecheck

    - name: Lint Bandit
      run: make lint-bandit

    - run: make test-cov
    - name: Upload coverage to CodeCov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

    - name: Upload test results to CodeCov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ./junit.xml
        report_type: test_results
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

  e2e-tests:
    runs-on: ubuntu-latest
    name: Integration tests
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      id: setup_python
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install and configure Poetry
      uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
      with:
        version: ${{ env.POETRY_VERSION }}
        virtualenvs-create: true
        virtualenvs-in-project: true
        installer-parallel: true

    - name: Cache Dependencies
      id: cache-dev-deps
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .venv
        key: poetry-dev-deps-${{ github.job }}-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-poetry${{ env.POETRY_VERSION }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          poetry-dev-deps-${{ github.job }}-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-poetry${{ env.POETRY_VERSION }}-

    - run: make dev-deps
    - run: ./scripts/minikube-smoketests.sh
      env:
        TWINGATE_API_KEY: ${{ secrets.TWINGATE_API_KEY }}
        TWINGATE_HOST: ${{ secrets.TWINGATE_HOST }}
        TWINGATE_NETWORK: ${{ secrets.TWINGATE_NETWORK }}
        TWINGATE_REMOTE_NETWORK_ID: ${{ secrets.TWINGATE_REMOTE_NETWORK_ID }}
        TWINGATE_TEST_PRINCIPAL_ID: ${{ secrets.TWINGATE_TEST_PRINCIPAL_ID }}

  build:
    runs-on: ubuntu-latest
    name: Image Build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install and configure Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Expose GitHub Runtime (ACTION_* env vars required for docker caching)
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - run: make multiarch-image-build-dev
        env:
          DOCKER_BUILDX_CACHE: --cache-to type=gha,mode=max --cache-from type=gha

  release_dev:
    runs-on: ubuntu-latest
    name: Release dev
    needs: [dockerfile-lint, helm-tests, unit-tests, e2e-tests, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install and configure Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Set DEV release version
        run: |
          DEV_VERSION=$(make version-dev BUILD_ID=${{ github.run_id }})
          poetry version "$DEV_VERSION"            # PEP-440 in pyproject is fine; never read back
          echo "VERSION=$DEV_VERSION" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Expose GitHub Runtime (ACTION_* env vars required for docker caching)
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - run: make multiarch-image-build-push-dev
        env:
          DOCKER_BUILDX_CACHE: --cache-to type=gha,mode=max --cache-from type=gha

  release_dev_helm:
    runs-on: ubuntu-latest
    name: Release DEV Helm Chart
    needs: [release_dev]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-tags: true
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install and configure Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.19.2'
      - uses: chrisdickinson/setup-yq@3d931309f27270ebbafd53f2daee773a82ea1822 # v1.0.1

      - name: Set env vars
        run: |
          echo "CHART_VERSION=$(make version-dev BUILD_ID=${{ github.run_id }})" >> "$GITHUB_ENV"

      - name: Helm Publish (Github)
        env:
          REGISTRY: ghcr.io
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login -u twingate --password-stdin $REGISTRY
          helm dependency build ./deploy/twingate-operator
          helm package deploy/twingate-operator --version $CHART_VERSION --app-version $CHART_VERSION
          helm push twingate-operator-$CHART_VERSION.tgz oci://$REGISTRY/twingate/helmcharts
