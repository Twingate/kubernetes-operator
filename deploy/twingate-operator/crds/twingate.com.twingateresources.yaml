apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: twingateresources.twingate.com
spec:
  group: twingate.com
  versions:
    - name: v1beta
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: "TwingateResource represents a resource in Twingate."
          required: ["spec"]
          properties:
            spec:
              type: object
              description: "TwingateResourceSpec defines the desired state of TwingateResource"
              x-kubernetes-validations:
                - rule: (self.isBrowserShortcutEnabled && !(self.address.contains('*') || self.address.contains('?'))) || (self.isBrowserShortcutEnabled == false)
                  message: "if isBrowserShortcutEnabled is set to true, then address can't be wildcard"
                - rule: (self.type == "Network" && !has(self.gatewayRef)) || ((self.type == "Kubernetes" || self.type == "WebApp") && has(self.gatewayRef))
                  message: "Kubernetes and WebApp Resources require gatewayRef; Network Resources do not allow it"
                - rule: (self.type == "WebApp" && has(self.downstream) && has(self.upstream)) || (self.type != "WebApp" && !has(self.downstream) && !has(self.upstream))
                  message: "WebApp Resource requires downstream and upstream; other Resource types allow neither"
                - rule: (self.isBrowserShortcutEnabled && self.type == "Network") || (self.isBrowserShortcutEnabled == false)
                  message: "isBrowserShortcutEnabled can only be set to true for Network Resources"
              required: ["name", "address"]
              properties:
                id:
                  type: string
                  nullable: true
                name:
                  type: string
                  description: "Name of the resource."
                address:
                  type: string
                  description: "Address of the resource."
                alias:
                  type: string
                  nullable: true
                  description: "Alias of the resource."
                isBrowserShortcutEnabled:
                  type: boolean
                  default: false
                  description: "isBrowserShortcutEnabled specifies whether the resource will display a browser shortcut in the Twingate client."
                securityPolicyId:
                  type: string
                  nullable: true
                  pattern: "^[-A-Za-z0-9+/]*={0,3}$"
                isVisible:
                  type: boolean
                  default: true
                  description: "isVisible specifies whether the resource will display in the main resources list in the Twingate client."
                protocols:
                  type: object
                  nullable: true
                  description: "protocols specifies the resource's protocol policies."
                  properties:
                    allowIcmp:
                      type: boolean
                      nullable: true
                      description: "allowIcmp specifies whether the resource will allow ICMP traffic."
                    tcp:
                      type: object
                      nullable: true
                      description: "tcp specifies the resource's TCP protocol policy."
                      x-kubernetes-validations:
                        - rule: (self.policy == "ALLOW_ALL" && size(self.ports) == 0) || (self.policy == "RESTRICTED")
                          message: "Can't specify port ranges for ALLOW_ALL policy."
                      properties:
                         policy:
                           type: string
                           nullable: true
                           enum:
                             - ALLOW_ALL
                             - RESTRICTED
                         ports:
                           type: array
                           default: []
                           items:
                             type: object
                             x-kubernetes-validations:
                               - rule: (self.start <= self.end)
                                 message: "Start port value must be less or equal to end port value"
                             properties:
                               start:
                                 type: integer
                                 minimum: 1
                                 maximum: 65535
                               end:
                                 type: integer
                                 minimum: 1
                                 maximum: 65535
                    udp:
                      type: object
                      nullable: true
                      description: "udp specifies the resource's UDP protocol policy."
                      x-kubernetes-validations:
                        - rule: (self.policy == "ALLOW_ALL" && size(self.ports) == 0) || (self.policy == "RESTRICTED")
                          message: "Can't specify port ranges for ALLOW_ALL policy."
                      properties:
                         policy:
                           type: string
                           nullable: true
                           enum:
                             - ALLOW_ALL
                             - RESTRICTED
                         ports:
                           type: array
                           default: []
                           items:
                             type: object
                             x-kubernetes-validations:
                               - rule: (self.start <= self.end)
                                 message: "Start port value must be less or equal to end port value"
                             properties:
                               start:
                                 type: integer
                                 minimum: 1
                                 maximum: 65535
                               end:
                                 type: integer
                                 minimum: 1
                                 maximum: 65535
                syncLabels:
                  type: boolean
                  default: true
                  description: "syncLabels specifies whether the resource should sync the metadata labels as resource tags in the Twingate client."
                type:
                  type: string
                  description: "The resource type"
                  default: Network
                  enum:
                    - Network
                    - Kubernetes
                    - WebApp
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                      message: "Resource type is immutable"
                gatewayRef:
                  type: object
                  required: ["name"]
                  description: "Reference to the TwingateGateway this Kubernetes or WebApp Resource is served by."
                  properties:
                    name:
                      type: string
                      description: "Name of the TwingateGateway object."
                    namespace:
                      type: string
                      default: default
                      description: "Namespace of the TwingateGateway object."
                downstream:
                  type: object
                  required: ["port"]
                  description: "Downstream (client-facing) configuration for a WebApp Resource."
                  properties:
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      description: "The downstream port."
                upstream:
                  type: object
                  required: ["port"]
                  description: "Upstream (target) configuration for a WebApp Resource."
                  properties:
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      description: "The upstream port."
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: ID
          type: string
          description: "The ID of the resource."
          jsonPath: .spec.id
        - name: Display Name
          type: string
          description: "Name of the resource."
          jsonPath: .spec.name
        - name: Type
          type: string
          description: "Type of the resource."
          jsonPath: .spec.type
        - name: Address
          type: string
          description: "Address of the resource."
          jsonPath: .spec.address
        - name: Alias
          type: string
          description: "Alias of the resource."
          jsonPath: .spec.alias
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: twingateresources
    singular: twingateresource
    kind: TwingateResource
    shortNames:
      - tgr
      - tres
    categories:
      - all
      - twingate
