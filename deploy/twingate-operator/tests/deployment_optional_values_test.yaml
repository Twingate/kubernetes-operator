suite: Deployment
templates:
  - deployment.yaml
set:
  twingateOperator:
    network: <network slug>
    apiKey: <api key>
    remoteNetworkId: <remote network id>
tests:
  - it: should use `logFormat`
    set:
      twingateOperator:
        logFormat: plain
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content:
            --log-format=plain
  - it: should use `logVerbosity`
    set:
      twingateOperator:
        logVerbosity: verbose
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content:
            --verbose
  - it: should use `defaultResourceTags`
    set:
      twingateOperator:
        defaultResourceTags:
          cluster: test-cluster
          owner: eran
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TWINGATE_DEFAULT_RESOURCE_TAGS
            value: '{"cluster":"test-cluster","owner":"eran"}'
  - it: should use `namespaces`
    set:
      twingateOperator:
        namespaces:
          - foo
          - bar
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - kopf
            - run
            - ./main.py
            - --namespace=foo
            - --namespace=bar
            - --standalone
            - --liveness=http://0.0.0.0:8080/healthz
            - --log-format=full
  - it: should use `imagePullSecrets`
    set:
      imagePullSecrets:
        - my-image-pull-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0]
          value: my-image-pull-secret
  - it: should use `podAnnotations`
    set:
      podAnnotations:
        foo: bar
    asserts:
      - equal:
          path: spec.template.metadata.annotations.foo
          value: bar
  - it: should use `podLabels`
    set:
      podLabels:
        foo: bar
    asserts:
      - equal:
          path: spec.template.metadata.labels.foo
          value: bar
  - it: should use `resources`
    set:
      resources:
         limits:
           cpu: 100m
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 100m
  - it: should use `nodeSelector`
    set:
      nodeSelector:
        foo: bar
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.foo
          value: bar
  - it: should use `affinity`
    set:
      affinity:
        foo: bar
    asserts:
      - equal:
          path: spec.template.spec.affinity.foo
          value: bar
  - it: should use `tolerations`
    set:
      tolerations:
        - foo: bar
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].foo
          value: bar
  - it: should use `priorityClassName`
    set:
      priorityClassName: myPriorityClass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: myPriorityClass
  - it: should use `extraEnvVars`
    set:
      extraEnvVars:
        - name: FOO
          value: bar
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: bar
  - it: should use `livenessProbe` overrides
    set:
      livenessProbe:
        timeoutSeconds: 5
        periodSeconds: 30
        failureThreshold: 5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 5
  - it: should use `readinessProbe` overrides
    set:
      readinessProbe:
        timeoutSeconds: 5
        periodSeconds: 30
        failureThreshold: 5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 5
