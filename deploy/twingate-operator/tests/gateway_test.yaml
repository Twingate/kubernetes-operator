suite: Gateway
templates:
  - charts/gateway/templates/*.yaml
set:
  twingateOperator:
    network: <network slug>
    apiKey: <api key>
    remoteNetworkId: <remote network id>
tests:
  - it: should enable Gateway
    # Hardcode the chart version and app version to ensure that the snapshot is stable
    # when upgrading Gateway subchart
    chart:
      version: 1.0.0
      appVersion: 1.0.0
    set:
      gateway:
        enabled: true
        twingate:
          network: <network slug>
        tls:
          autoGenerated: false
          cert: <tls cert>
          key: <tls key>
          ca: <ca cert>
    asserts:
      - matchSnapshot: {}
